<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Multi-Track Web DAW</title>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <style>
        /* Full Screen Layout */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d0f; color: #e2e8f0;
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* Top Toolbar */
        .toolbar {
            background: #1a1a1e; padding: 15px 25px; border-bottom: 2px solid #27272a;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .toolbar-group { display: flex; gap: 15px; align-items: center; }
        h1 { margin: 0; color: #3b82f6; font-size: 1.5rem; }
        
        /* Main Workspace */
        .workspace {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        /* Individual Track UI */
        .track {
            background: #1f1f23; border: 1px solid #3f3f46; border-radius: 8px;
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .track-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #3f3f46; padding-bottom: 10px;
        }
        .track-title { font-weight: 600; color: #94a3b8; font-size: 1.1rem; }
        .waveform-container { width: 100%; background: #121214; border-radius: 6px; position: relative; }
        
        .track-controls { 
            display: flex; align-items: center; gap: 15px; margin-top: 5px; flex-wrap: wrap;
        }
        .volume-control {
            display: flex; align-items: center; gap: 10px; background: #27272a; 
            padding: 5px 15px; border-radius: 6px; font-size: 0.9rem;
        }
        .volume-control input[type="range"] { cursor: pointer; }

        /* Buttons */
        button {
            background: #3b82f6; color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .btn-add { background: #8b5cf6; } .btn-add:hover { background: #7c3aed; }
        .btn-play { background: #10b981; } .btn-play:hover { background: #059669; }
        .btn-export { background: #f59e0b; color: black; } .btn-export:hover { background: #d97706; }
        .btn-danger { background: #ef4444; padding: 6px 12px; font-size: 0.85rem; } .btn-danger:hover { background: #dc2626; }
        .btn-edit { background: #475569; font-size: 0.85rem; } .btn-edit:hover { background: #64748b; }

        /* Hidden File Input */
        #file-input { display: none; }
        
        #status { font-size: 0.9rem; color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="toolbar-group">
            <h1>Web DAW</h1>
            <button class="btn-add" onclick="document.getElementById('file-input').click()">+ Add Track</button>
            <input type="file" id="file-input" accept="audio/*" multiple>
            <button class="btn-play" id="btn-master-play" disabled>Play / Pause All</button>
            <span id="status">Shift+Drag to select. Adjust volume to mix.</span>
        </div>
        <div class="toolbar-group">
            <button class="btn-export" id="btn-mixdown" disabled>Export Master Mixdown (WAV)</button>
        </div>
    </div>

    <div class="workspace" id="workspace"></div>

<script>
    let audioContext = null;
    let tracks = []; 
    let trackCounter = 0;

    const workspace = document.getElementById('workspace');
    const statusText = document.getElementById('status');
    const btnMasterPlay = document.getElementById('btn-master-play');
    const btnMixdown = document.getElementById('btn-mixdown');

    // Handle File Uploads
    document.getElementById('file-input').addEventListener('change', async function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        for (const file of files) {
            await processNewTrack(file);
        }
        
        this.value = ''; 
        updateMasterControls();
    });

    async function processNewTrack(file) {
        statusText.innerText = `Loading ${file.name}...`;
        const currentId = trackCounter++;
        
        // HTML Elements for the new track (Now includes Volume Slider)
        const trackDiv = document.createElement('div');
        trackDiv.className = 'track';
        trackDiv.id = `track-wrapper-${currentId}`;
        trackDiv.innerHTML = `
            <div class="track-header">
                <span class="track-title">🎵 ${file.name}</span>
                <button class="btn-danger" onclick="removeTrack(${currentId})">X Remove</button>
            </div>
            <div class="waveform-container" id="waveform-${currentId}"></div>
            <div class="track-controls">
                <button class="btn-edit" onclick="trimTrack(${currentId})">Trim Selection</button>
                <button class="btn-edit" onclick="cutTrack(${currentId})">Cut Selection</button>
                <div class="volume-control">
                    <label>Volume:</label>
                    <input type="range" min="0" max="1.5" step="0.05" value="1" 
                           oninput="changeVolume(${currentId}, this.value)">
                </div>
            </div>
        `;
        workspace.appendChild(trackDiv);

        try {
            const arrayBuffer = await file.arrayBuffer();
            const buffer = await audioContext.decodeAudioData(arrayBuffer);

            const ws = WaveSurfer.create({
                container: `#waveform-${currentId}`,
                waveColor: '#6366f1', progressColor: '#818cf8', cursorColor: '#f43f5e',
                barWidth: 2, barRadius: 3, height: 120, normalize: true
            });

            const wsRegions = ws.registerPlugin(WaveSurfer.Regions.create());
            wsRegions.enableDragSelection({ color: 'rgba(244, 63, 94, 0.3)' });

            wsRegions.on('region-created', (region) => {
                const regions = wsRegions.getRegions();
                if (regions.length > 1) regions[0].remove();
            });

            // Save track with a default volume of 1 (100%)
            const trackObj = {
                id: currentId, name: file.name, buffer: buffer,
                wavesurfer: ws, regions: wsRegions, volume: 1.0
            };
            tracks.push(trackObj);

            loadBufferIntoTrack(trackObj, buffer);

        } catch (err) {
            console.error(err);
            statusText.innerText = "Error loading audio!";
        }
    }

    function loadBufferIntoTrack(trackObj, buffer) {
        const wavBlob = bufferToWav(buffer);
        const url = URL.createObjectURL(wavBlob);
        trackObj.wavesurfer.load(url);
        
        // Ensure the wavesurfer respects the current volume setting after reloading a trimmed file
        trackObj.wavesurfer.once('ready', () => {
            trackObj.wavesurfer.setVolume(trackObj.volume);
        });
        
        trackObj.regions.clearRegions();
        statusText.innerText = "Ready.";
    }

    // --- Master Controls & Volume ---

    function updateMasterControls() {
        const hasTracks = tracks.length > 0;
        btnMasterPlay.disabled = !hasTracks;
        btnMixdown.disabled = !hasTracks;
    }

    btnMasterPlay.addEventListener('click', () => {
        tracks.forEach(t => t.wavesurfer.playPause());
    });

    window.changeVolume = function(id, value) {
        const trackObj = getTrack(id);
        if (!trackObj) return;
        trackObj.volume = parseFloat(value);
        trackObj.wavesurfer.setVolume(trackObj.volume); // Update live playback volume
    };

    // --- Individual Track Edits ---

    function getTrack(id) { return tracks.find(t => t.id === id); }

    window.removeTrack = function(id) {
        const trackObj = getTrack(id);
        if(!trackObj) return;
        trackObj.wavesurfer.destroy();
        document.getElementById(`track-wrapper-${id}`).remove();
        tracks = tracks.filter(t => t.id !== id);
        updateMasterControls();
    };

    window.trimTrack = function(id) {
        const trackObj = getTrack(id);
        const regions = trackObj.regions.getRegions();
        if (regions.length === 0) return alert('Shift+Drag to select an area first!');
        
        const newBuffer = sliceAudioBuffer(trackObj.buffer, regions[0].start, regions[0].end);
        trackObj.buffer = newBuffer;
        loadBufferIntoTrack(trackObj, newBuffer);
    };

    window.cutTrack = function(id) {
        const trackObj = getTrack(id);
        const regions = trackObj.regions.getRegions();
        if (regions.length === 0) return alert('Shift+Drag to select an area first!');
        
        const newBuffer = deleteFromAudioBuffer(trackObj.buffer, regions[0].start, regions[0].end);
        trackObj.buffer = newBuffer;
        loadBufferIntoTrack(trackObj, newBuffer);
    };

    // --- Audio DSP Engine ---

    function sliceAudioBuffer(buffer, startSec, endSec) {
        const sampleRate = buffer.sampleRate;
        const channels = buffer.numberOfChannels;
        const startFrame = Math.floor(startSec * sampleRate);
        const endFrame = Math.floor(endSec * sampleRate);
        const length = endFrame - startFrame;

        const newCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(channels, length, sampleRate);
        const newBuffer = newCtx.createBuffer(channels, length, sampleRate);

        for (let i = 0; i < channels; i++) {
            const channelData = buffer.getChannelData(i);
            const newChannelData = newBuffer.getChannelData(i);
            for (let j = 0; j < length; j++) { newChannelData[j] = channelData[startFrame + j]; }
        }
        return newBuffer;
    }

    function deleteFromAudioBuffer(buffer, startSec, endSec) {
        const sampleRate = buffer.sampleRate;
        const channels = buffer.numberOfChannels;
        const startFrame = Math.floor(startSec * sampleRate);
        const endFrame = Math.floor(endSec * sampleRate);
        const newLength = buffer.length - (endFrame - startFrame);

        const newCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(channels, newLength, sampleRate);
        const newBuffer = newCtx.createBuffer(channels, newLength, sampleRate);

        for (let i = 0; i < channels; i++) {
            const channelData = buffer.getChannelData(i);
            const newChannelData = newBuffer.getChannelData(i);
            
            for (let j = 0; j < startFrame; j++) { newChannelData[j] = channelData[j]; }
            for (let j = endFrame; j < buffer.length; j++) { newChannelData[startFrame + (j - endFrame)] = channelData[j]; }
        }
        return newBuffer;
    }

    // --- Master Mixdown Export ---
    
    btnMixdown.addEventListener('click', async () => {
        if(tracks.length === 0) return;
        statusText.innerText = "Rendering Master Mixdown... Please wait.";
        
        try {
            let maxDuration = 0;
            const sampleRate = tracks[0].buffer.sampleRate;
            tracks.forEach(t => { if(t.buffer.duration > maxDuration) maxDuration = t.buffer.duration; });

            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(2, Math.ceil(sampleRate * maxDuration), sampleRate);

            tracks.forEach(t => {
                const source = offlineCtx.createBufferSource();
                source.buffer = t.buffer;
                
                // Route the audio through a GainNode to apply the user's volume setting
                const gainNode = offlineCtx.createGain();
                gainNode.gain.value = t.volume;
                
                source.connect(gainNode);
                gainNode.connect(offlineCtx.destination);
                
                source.start(0);
            });

            const renderedBuffer = await offlineCtx.startRendering();
            
            const wavBlob = bufferToWav(renderedBuffer);
            const url = URL.createObjectURL(wavBlob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Master_Mixdown.wav';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            statusText.innerText = "Mixdown complete!";
        } catch (err) {
            console.error(err);
            statusText.innerText = "Mixdown failed. Files may be incompatible.";
        }
    });

    // --- WAV Encoding Boilerplate ---
    function bufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const arrayBuffer = new ArrayBuffer(length);
        const view = new DataView(arrayBuffer);
        const channels = [];
        let offset = 0, pos = 0;

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); 
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan); 
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4); 

        for (let i = 0; i < buffer.numberOfChannels; i++) { channels.push(buffer.getChannelData(i)); }

        while (pos < buffer.length) {
            for (let i = 0; i < numOfChan; i++) {
                let sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(offset, sample, true);
                offset += 2;
            }
            pos++;
        }
        return new Blob([arrayBuffer], { type: 'audio/wav' });

        function setUint16(data) { view.setUint16(offset, data, true); offset += 2; }
        function setUint32(data) { view.setUint32(offset, data, true); offset += 4; }
    }
</script>

</body>
</html>
